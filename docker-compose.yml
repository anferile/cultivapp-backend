services:
  db:
    image: postgres:16
    container_name: cultivapp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cultivapp_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - cultivapp_pgdata:/var/lib/postgresql/data

volumes:
  cultivapp_pgdata: